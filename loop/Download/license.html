<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Loop | License Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0f;--card:#161618;--bdr:#2a2a30;--bdr-h:#3d3d48;--ac:#8a2be2;--ac-l:#a855f7;--ac-g:rgba(138,43,226,0.25);--w:#f0f0f2;--m:#6b6b78;--s:#9999a8}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--w);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;-webkit-font-smoothing:antialiased}
#c{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.card{position:relative;z-index:1;background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:44px 36px 38px;width:100%;max-width:400px;text-align:center;box-shadow:0 0 40px rgba(138,43,226,0.08);margin:0 18px}
.logo{font-size:22px;font-weight:800;letter-spacing:-0.3px;margin-bottom:8px}
.logo span{color:var(--ac-l)}
.sub{font-size:13px;color:var(--s);margin-bottom:28px}
.inp-wrap{margin-bottom:14px}
.inp{width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--bdr-h);background:var(--bg);color:var(--w);font-family:inherit;font-size:14px;font-weight:500;outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-g)}
.inp::placeholder{color:var(--m)}
.err{color:#ff6b6b;font-size:12px;font-weight:600;min-height:18px;margin-bottom:10px}
.btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--ac);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,box-shadow .2s,transform .15s}
.btn:hover{background:var(--ac-l);box-shadow:0 4px 18px var(--ac-g);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
<div class="logo">Nexus <span>Loop</span></div>
<div class="sub">Enter your license key to access downloads</div>
<div class="inp-wrap"><input type="text" id="k" class="inp" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false"></div>
<div class="err" id="e"></div>
<button class="btn" id="s">Access Downloads</button>
</div>

<script>
(function(){
var FALLBACK_KEYS=["NEXUS-LOOP-2024-VIP","K2NT1-ALPHA-KEY-001","K2NT1-BETA-KEY-002"];
var i=document.getElementById("k"),b=document.getElementById("s"),er=document.getElementById("e"),busy=false;

function n(x){return x.replace(/\s+/g,"").toUpperCase()}
function localCheck(x){var m=n(x);for(var j=0;j<FALLBACK_KEYS.length;j++)if(n(FALLBACK_KEYS[j])===m)return true;return false}
function ok(){er.textContent="";sessionStorage.setItem("nexus_loop_verified","1");window.location.replace("index.html")}
function fail(msg){er.textContent=msg||"Invalid license key. Please try again.";i.value="";i.focus();busy=false}

function t(){
if(busy)return;
var x=i.value.trim();
if(!x){er.textContent="Please enter a license key.";return}
busy=true;er.textContent="Verifying...";b.style.opacity="0.7";b.style.pointerEvents="none";

fetch("verify.php",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:x})})
.then(function(r){return r.json()})
.then(function(d){
if(d&&d.success){ok();}else{fail(d&&d.message?d.message:"KeyAuth rejected the key.");}
b.style.opacity="";b.style.pointerEvents="";
})
.catch(function(){
if(localCheck(x)){ok();}else{fail("Invalid license key (offline fallback).");}
b.style.opacity="";b.style.pointerEvents="";
});
}

b.addEventListener("click",t);
i.addEventListener("keydown",function(e){if(e.key==="Enter")t()});
})();
</script>

<script>
(function(){
var c=document.getElementById('c'),x=c.getContext('2d'),W,H,m={x:-9999,y:-9999},P=90,CD=140,MD=160,p=[];
function r(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
function Particle(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.r=Math.random()*1.5+0.8;this.ba=Math.random()*0.4+0.2}
Particle.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W)this.vx*=-1;if(this.y<0||this.y>H)this.vy*=-1;var dx=m.x-this.x,dy=m.y-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d<MD&&d>0){var f=(MD-d)/MD*0.018;this.vx+=dx/d*f;this.vy+=dy/d*f}var s=Math.sqrt(this.vx*this.vx+this.vy*this.vy);if(s>1.8){this.vx=(this.vx/s)*1.8;this.vy=(this.vy/s)*1.8}};
Particle.prototype.draw=function(){x.beginPath();x.arc(this.x,this.y,this.r,0,Math.PI*2);x.fillStyle='rgba(168,85,247,'+this.ba+')';x.fill()};
function I(){p=[];for(var i=0;i<P;i++)p.push(new Particle())}
function dl(){for(var i=0;i<p.length;i++){for(var j=i+1;j<p.length;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<CD){var a=(1-d/CD)*0.35;x.beginPath();x.moveTo(p[i].x,p[i].y);x.lineTo(p[j].x,p[j].y);x.strokeStyle='rgba(138,43,226,'+a+')';x.lineWidth=0.8;x.stroke()}}var mdx=m.x-p[i].x,mdy=m.y-p[i].y,md=Math.sqrt(mdx*mdx+mdy*mdy);if(md<MD){var ma=(1-md/MD)*0.55;x.beginPath();x.moveTo(p[i].x,p[i].y);x.lineTo(m.x,m.y);x.strokeStyle='rgba(168,85,247,'+ma+')';x.lineWidth=0.9;x.stroke()}}}
function L(){x.clearRect(0,0,W,H);dl();for(var i=0;i<p.length;i++){p[i].update();p[i].draw()}requestAnimationFrame(L)}
window.addEventListener('resize',function(){r();I()});window.addEventListener('mousemove',function(e){m.x=e.clientX;m.y=e.clientY});window.addEventListener('mouseleave',function(){m.x=-9999;m.y=-9999});r();I();L();
})();
</script>

<script>
(function(){
document.addEventListener('contextmenu',function(e){e.preventDefault()});
document.addEventListener('keydown',function(e){
if(e.key==='F12'){e.preventDefault();return false}
if(e.ctrlKey&&e.shiftKey&&['I','i','J','j','C','c'].includes(e.key)){e.preventDefault();return false}
if(e.ctrlKey&&['u','U'].includes(e.key)){e.preventDefault();return false}
if(e.ctrlKey&&['s','S'].includes(e.key)){e.preventDefault();return false}
});
})();
</script>
</body>
</html>
